<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Roboto, and Roboto Mono fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital@0;1&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet"
/>

    <link id="smui-theme-link" rel="stylesheet" href="/smui.css" />

	<style>
		body {  
      margin: 0;
      /* padding: 0; */
    }
	</style>

    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = storedTheme === 'dark' || (!storedTheme && systemPrefersDark);

          if (isDark) {
            document.getElementById('smui-theme-link').href = '/smui-dark.css';
            // Optional: Good practice for other CSS selectors
            document.documentElement.setAttribute('data-theme', 'dark'); 
          } else {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) { }
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
