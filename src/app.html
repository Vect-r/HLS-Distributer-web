<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,600,700" />

    <link id="smui-theme-link" rel="stylesheet" href="/smui.css" />

	<style>
		body{
			margin: 0;
			padding: 0;
		}
	</style>

    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = storedTheme === 'dark' || (!storedTheme && systemPrefersDark);

          if (isDark) {
            document.getElementById('smui-theme-link').href = '/smui-dark.css';
            // Optional: Good practice for other CSS selectors
            document.documentElement.setAttribute('data-theme', 'dark'); 
          } else {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) { }
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
